<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SlimeNRF Firmware Builder</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --sub:#12151b; --line:#2a2f3a; --fg:#e7e9ee; --muted:#9aa3b2; --accent:#6ea8fe; --ok:#4ade80; --err:#f87171; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, "Noto Sans TC", "Noto Sans JP", sans-serif; background:var(--bg); color:var(--fg); }
  .wrap { max-width: 640px; margin: 0 auto; padding: 28px 20px 64px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 22px; font-size: 14px; }
  .card { background: var(--card); border:1px solid var(--line); border-radius: 14px; padding: 20px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:12px; }
  label { display:block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
  .grid label { margin-top: 0; }
  select, input[type="number"] { width:100%; padding: 10px 12px; background:#0f1218; color:var(--fg); border:1px solid var(--line); border-radius: 9px; font-size: 15px; }
  select:disabled { opacity:.5; }
  .section-title { font-size: 13px; color: var(--muted); margin: 18px 0 8px; }
  .pins { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:10px; }
  .pins label { font-size:12px; color:#7f8794; margin:0 0 4px; }
  .warn { margin-top:10px; font-size: 13px; color: var(--err); min-height: 18px; }
  pre { font-family: ui-monospace, monospace; font-size: 12px; line-height:1.6; background:var(--sub); border:1px solid var(--line); border-radius: 9px; padding: 12px; white-space: pre-wrap; margin:8px 0 0; color:#cdd3dd; }
  button { width:100%; margin-top: 20px; padding: 13px; font-size: 15px; font-weight: 600; background: var(--accent); color:#08111f; border:none; border-radius: 10px; cursor:pointer; }
  button:disabled { opacity:.5; cursor: not-allowed; }
  #status { margin-top: 16px; font-size: 14px; min-height: 20px; }
  #progress { display:none; height:8px; background:var(--line); border-radius:5px; overflow:hidden; margin-top:12px; }
  #progressBar { height:100%; width:0%; background:var(--accent); transition: width .5s ease, background .3s; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--muted); border-top-color: var(--accent); border-radius:50%; animation: spin .8s linear infinite; vertical-align:-2px; margin-right:8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a.dl { display:inline-block; margin-top: 6px; color: var(--ok); font-weight:600; text-decoration: none; }
  .err { color: var(--err); }
  .note { background:var(--sub); border:1px solid var(--line); border-radius:9px; padding:12px; font-size:14px; color:var(--muted); margin-top:14px; }
  .langbar { display:flex; gap:6px; justify-content:flex-end; margin-bottom:8px; }
  .langbar button { width:auto; margin:0; padding:4px 10px; font-size:12px; font-weight:500; background:transparent; color:var(--muted); border:1px solid var(--line); border-radius:7px; }
  .langbar button.on { background:var(--accent); color:#08111f; border-color:var(--accent); }
  .help { display:inline-flex; width:15px; height:15px; border:1px solid var(--line); border-radius:50%; font-size:11px; line-height:1; align-items:center; justify-content:center; margin-left:6px; color:var(--muted); cursor:help; vertical-align:middle; }
  .sec { font-size:12px; font-weight:600; letter-spacing:.03em; color:var(--muted); margin:22px 0 10px; padding-top:16px; border-top:1px solid var(--line); }
  details { margin-top:18px; border-top:1px solid var(--line); padding-top:14px; }
  details summary::-webkit-details-marker { color:var(--muted); }
  .off { opacity:.45; }
</style>
</head>
<body>
<div class="wrap">
  <div class="langbar">
    <span style="flex:1; display:flex; gap:6px;">
      <button id="exportBtn" data-i18n="exportCfg"></button>
      <button id="importBtn" data-i18n="importCfg"></button>
    </span>
    <button data-lang="zh">中文</button>
    <button data-lang="en">EN</button>
    <button data-lang="ja">日本語</button>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none">
  </div>

  <h1 data-i18n="title">SlimeNRF Firmware Builder</h1>
  <p class="sub" data-i18n="subtitle"></p>

  <div class="card">
    <div class="grid">
      <div><label for="type" data-i18n="type"></label><select id="type"><option value="tracker"></option><option value="receiver"></option></select></div>
      <div><label for="mod" data-i18n="module"></label><select id="mod"></select></div>
    </div>

    <div id="trackerOpts">
      <div class="sec" data-i18n="secSensor"></div>
      <div class="grid">
        <div><label for="imu"><span data-i18n="imu"></span><span class="help" data-help="helpIMU">?</span></label><select id="imu">
          <option value="ICM42688">ICM-42688-P</option>
          <option value="ICM45686">ICM-45686</option>
          <option value="LSM6DSV" selected>LSM6DSV</option>
          <option value="LSM6DSO">LSM6DSO</option>
          <option value="LSM6DSM">LSM6DSM</option>
          <option value="ISM330BX">ISM330BX</option>
          <option value="BMI270">BMI270</option>
        </select></div>
        <div><label for="bus"><span data-i18n="bus"></span><span class="help" data-help="helpBus">?</span></label><select id="bus"><option value="spi">SPI</option><option value="i2c">I2C</option></select></div>
      </div>
      <div class="grid" style="margin-top:12px;">
        <div><label for="magconn"><span data-i18n="magConn"></span><span class="help" data-help="helpMagConn">?</span></label><select id="magconn">
          <option value="none"></option>
          <option value="aux"></option>
          <option value="i2c_shared"></option>
          <option value="i2c"></option>
          <option value="spi"></option>
        </select></div>
      </div>

      <div class="sec" data-i18n="secPower"></div>
      <div class="grid">
        <div><label for="battery"><span data-i18n="battery"></span><span class="help" data-help="helpBattery">?</span></label><select id="battery"><option value="liion"></option><option value="nimh"></option><option value="none"></option></select></div>
        <div><label for="adc"><span data-i18n="adc"></span><span class="help" data-help="helpADC">?</span></label><select id="adc"><option value="external"></option><option value="internal"></option></select></div>
      </div>
      <div id="adcFields" class="grid" style="margin-top:12px;">
        <div><label for="adcPin"><span data-i18n="adcPin"></span></label><select id="adcPin"></select></div>
        <div><label for="adcR1"><span data-i18n="adcR1"></span></label><input id="adcR1" type="number" min="0" value="0"></div>
        <div><label for="adcR2"><span data-i18n="adcR2"></span></label><input id="adcR2" type="number" min="0" value="0"></div>
      </div>

      <div class="sec" data-i18n="secBehavior"></div>
      <div class="grid">
        <div><label for="sleep"><span data-i18n="sleep"></span><span class="help" data-help="helpSleep">?</span></label><select id="sleep"><option value="disabled"></option><option value="enabled"></option></select></div>
        <div><label for="output"><span data-i18n="flash"></span><span class="help" data-help="helpFlash">?</span></label><select id="output"><option value="bootloader"></option><option value="swd"></option></select></div>
        <div><label for="featLed"><span data-i18n="featLed"></span><span class="help" data-help="helpFeatLed">?</span></label><select id="featLed"><option value="enabled"></option><option value="disabled"></option></select></div>
        <div id="wrapLedch"><label for="ledch"><span data-i18n="ledCh"></span><span class="help" data-help="helpLedCh">?</span></label><select id="ledch"><option value="1"></option><option value="2"></option><option value="3"></option></select></div>
        <div id="wrapLedpol"><label for="ledpol"><span data-i18n="ledPol"></span><span class="help" data-help="helpLedPol">?</span></label><select id="ledpol"><option value="high"></option><option value="low"></option></select></div>
        <div><label for="featSw0"><span data-i18n="featSw0"></span><span class="help" data-help="helpFeatSw0">?</span></label><select id="featSw0"><option value="disabled"></option><option value="enabled"></option></select></div>
        <div id="wrapExtra"><label for="extra"><span data-i18n="extraAct"></span><span class="help" data-help="helpExtraAct">?</span></label><select id="extra"><option value="disabled"></option><option value="enabled"></option></select></div>
        <div><label for="featClk"><span data-i18n="featClk"></span><span class="help" data-help="helpFeatClk">?</span></label><select id="featClk"><option value="disabled"></option><option value="enabled"></option></select></div>
        <div><label for="featVcc"><span data-i18n="featVcc"></span><span class="help" data-help="helpFeatVcc">?</span></label><select id="featVcc"><option value="disabled"></option><option value="enabled"></option></select></div>
        <div><label for="featUart"><span data-i18n="featUart"></span><span class="help" data-help="helpFeatUart">?</span></label><select id="featUart"><option value="disabled"></option><option value="enabled"></option></select></div>
        <div><label for="featPwr"><span data-i18n="featPwr"></span><span class="help" data-help="helpFeatPwr">?</span></label><select id="featPwr"><option value="disabled"></option><option value="enabled"></option></select></div>
      </div>

      <div class="sec" data-i18n="secPins"></div>
      <div id="pins" class="pins"></div>
      <div id="warn" class="warn"></div>

      <div class="sec" data-i18n="secDiagram"></div>
      <div id="boardWrap" style="background:var(--sub); border:1px solid var(--line); border-radius:9px; padding:10px;">
        <svg id="board" viewBox="0 0 520 360" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:auto; max-height:360px;" role="img"><title>wiring</title></svg>
      </div>

      <details style="margin-top:18px;">
        <summary style="cursor:pointer; font-size:13px; color:var(--muted); user-select:none;" data-i18n="secAdvanced"></summary>
        <label style="display:flex; align-items:center; gap:7px; margin:12px 0; font-size:13px; color:var(--muted); cursor:pointer;">
          <input type="checkbox" id="adv" style="width:auto; margin:0;"> <span data-i18n="advanced"></span>
        </label>
        <div class="section-title" data-i18n="overlayTitle"></div>
        <pre id="dts"></pre>
      </details>
    </div>

    <div id="recvNote" class="note" style="display:none;" data-i18n="recvNote"></div>
    <div id="recvOpts" style="display:none;">
      <div class="sec" data-i18n="secRecvLed"></div>
      <div class="grid">
        <div><label for="recvLed"><span data-i18n="recvLedPin"></span><span class="help" data-help="helpRecvLed">?</span></label><select id="recvLed"></select></div>
        <div><label for="recvLedPol"><span data-i18n="ledPol"></span><span class="help" data-help="helpLedPol">?</span></label><select id="recvLedPol"><option value="high"></option><option value="low"></option></select></div>
      </div>
    </div>
    <div id="unsupported" class="note" style="display:none;"></div>

    <button id="go"></button>
    <div id="progress"><div id="progressBar"></div></div>
    <div id="status"></div>
    <div id="logBox" style="display:none; margin-top:12px; font-family:ui-monospace,monospace; font-size:12px; line-height:1.8; background:#0b0e13; border:1px solid var(--line); border-radius:9px; padding:12px; color:#cdd3dd; max-height:220px; overflow:auto;"></div>
    <div id="logLink" style="display:none; margin-top:8px; font-size:13px;"></div>
  </div>
</div>

<div id="confirmOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:1000; align-items:center; justify-content:center; padding:20px;">
  <div style="background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; width:100%; max-width:460px; max-height:85vh; overflow:auto;">
    <div style="font-size:15px; font-weight:600; margin-bottom:12px;" data-i18n="confirmTitle"></div>
    <div id="confirmSummary" style="font-size:13px; line-height:1.7; font-family:ui-monospace,monospace; color:#cdd3dd; background:var(--sub); border:1px solid var(--line); border-radius:9px; padding:12px;"></div>
    <label style="display:flex; align-items:center; gap:7px; margin-top:12px; font-size:13px; color:var(--muted); cursor:pointer;">
      <input type="checkbox" id="force" style="width:auto; margin:0;"> <span data-i18n="forceRebuild"></span>
    </label>
    <div style="display:flex; gap:10px; margin-top:16px;">
      <button id="confirmYes" style="margin:0;" data-i18n="confirmYes"></button>
      <button id="confirmNo" style="margin:0; background:transparent; color:var(--muted); border:1px solid var(--line);" data-i18n="confirmNo"></button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = "https://slimenrf-web-builder.nekoda.workers.dev";

const I18N = {
  zh: {
    title:"SlimeNRF 固件產生器", subtitle:"選模組、指定每支腳接什麼，按下產生就會編出專屬固件。",
    module:"模組", type:"類型", typeTracker:"Tracker（追蹤器）", typeReceiver:"Dongle（接收器）",
    imu:"IMU 感測器", mag:"磁力計", magNone:"無", bus:"匯流排",
    magConn:"磁力計", magConnNone:"無", magConnAux:"接在 IMU 上（aux）", magConnI2cShared:"跟 IMU 同一條 I2C", magConnI2c:"獨立 I2C", magConnSpi:"與 IMU 同一條 SPI",
    helpMagConn:"磁力計晶片韌體會自動偵測，這裡只選「接在哪」。接在 IMU 上(aux)：只有 IMU 走 SPI 且為 ST 家族(LSM6DSV/DSO/ISM330BX/DSM)時可用，不占腳。跟 IMU 同一條 I2C：IMU 走 I2C 時共用 SDA/SCL。獨立 I2C：另接兩支 SDA/SCL。與 IMU 同一條 SPI：共用 SCK/MOSI/MISO，另接一支 CS。",
    pinMagSDA:"磁力計 SDA", pinMagSCL:"磁力計 SCL", pinMagCS:"磁力計 CS",

    secRecvLed:"接收器 LED（選填）", recvLedPin:"LED 腳位", helpRecvLed:"接收器狀態 LED 腳位。預設 P0.15（官方板腳）；自訂 dongle 板 LED 不在 P0.15 時，選實際腳位＋極性覆蓋；選「—」則不使用 LED。nRF52840 任意 GPIO 皆可。",

    advanced:"進階模式（有警告仍可生成）", confirmTitle:"確認以下設定？", confirmYes:"確認生成", confirmNo:"取消", forceRebuild:"強制重新編譯（忽略快取）", advNote:"進階模式：仍可生成，但請自行確認。", cached:"已有相同版本固件，直接提供下載（略過編譯）。", viewLog:"查看完整即時 log ↗", experimentalTag:"實驗性",

    adc:"電池量測", adcExternal:"外部 AIN 腳", adcInternal:"內建 VDDHDIV5", adcPin:"ADC 腳（AIN）", adcR1:"上臂電阻 R1 (kΩ)", adcR2:"下臂電阻 R2 (kΩ)", helpADC:"電池電壓量測來源。外部 AIN 腳可搭配分壓量測鋰電；電壓直接進 ADC（無分壓）兩個電阻留 0。內建 VDDHDIV5 是晶片內部量測。",

    featOn:"啟用", featOff:"停用",
    featLed:"狀態 LED", helpFeatLed:"狀態 LED，顯示配對/錯誤/充電/電量。停用則整板不裝 LED。打開後可設顏色通道、極性與腳位。",
    featSw0:"按鈕 SW0", helpFeatSw0:"實體按鈕。短按開機、長按關機、關機時長按可重設配對。額外功能開啟時連按可校正/配對/DFU。",

    featVcc:"感測器電源", helpFeatVcc:"用一支 GPIO 直接供電給感測器，睡眠時可切斷省電。",
    featUart:"UART 日誌", helpFeatUart:"接外部序列晶片輸出 log，或透過 bootloader 燒錄（需 TX/RX 兩腳）。",
    featPwr:"電源自鎖", helpFeatPwr:"用 GPIO 拉住 MOSFET 維持整板電源（配合實體自鎖開關電路）。",
    exportCfg:"匯出設定", importCfg:"匯入設定", importErr:"匯入失敗：檔案格式不正確。",
    pinSDA:"IMU SDA", pinSCL:"IMU SCL", pinSCK:"IMU SCK", pinMOSI:"IMU MOSI", pinMISO:"IMU MISO", pinCS:"IMU CS",
    pinINT:"IMU INT", pinCLK:"IMU CLK（選填）", pinLED:"LED 通道1", pinLED1:"LED 通道2", pinLED2:"LED 通道3", pinSW0:"按鈕 SW0（選填）", pinVCC:"感測器電源（選填）", pinTX:"UART TX（選填）", pinRX:"UART RX（選填）", pinPWR:"電源自鎖（選填）"
  },
  en: {
    title:"SlimeNRF Firmware Builder", subtitle:"Pick a module, map each pin, then build to get custom firmware.",
    module:"Module", type:"Type", typeTracker:"Tracker", typeReceiver:"Dongle (Receiver)",
    imu:"IMU sensor", mag:"Magnetometer", magNone:"None", bus:"Bus",
    magConn:"Magnetometer", magConnNone:"None", magConnAux:"On the IMU (aux)", magConnI2cShared:"Same I2C as IMU", magConnI2c:"Separate I2C", magConnSpi:"Same SPI as IMU",
    helpMagConn:"The mag chip is auto-detected; here you only choose where it connects. On the IMU (aux): only when the IMU is on SPI and is ST family (LSM6DSV/DSO/ISM330BX/DSM); no pins. Same I2C as IMU: when IMU is I2C, shares SDA/SCL. Separate I2C: adds its own SDA/SCL. Same SPI as IMU: shares SCK/MOSI/MISO, adds one CS.",
    pinMagSDA:"Mag SDA", pinMagSCL:"Mag SCL", pinMagCS:"Mag CS",
    sleep:"Sleep / wake", enabled:"Enabled", disabled:"Disabled",
    flash:"Flashing method", flashBoot:"Bootloader (USB .uf2)", flashSwd:"Direct SWD (no bootloader)",
    pinsTitle:"Pin assignment", diagramTitle:"Wiring diagram", overlayTitle:"Board overlay preview",

function detectLang() {
  try { const s = localStorage.getItem("lang"); if (s && I18N[s]) return s; } catch (e) {}
  const l = (navigator.language || "en").toLowerCase();
  if (l.indexOf("zh") === 0) return "zh";
  if (l.indexOf("ja") === 0) return "ja";
  return "en";
}
let LANG = detectLang();
function t() { return I18N[LANG]; }

function setOpt(sel, val, text) { const o = document.querySelector('#' + sel + ' option[value="' + val + '"]'); if (o) o.textContent = text; }

function applyLang() {
  const x = t();
  document.documentElement.lang = LANG === "zh" ? "zh-Hant" : LANG;
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = x[el.dataset.i18n]; });
  document.querySelectorAll("[data-help]").forEach(el => { el.title = x[el.dataset.help] || ""; });
  setOpt("type", "tracker", x.typeTracker); setOpt("type", "receiver", x.typeReceiver);
  setOpt("magconn", "none", x.magConnNone); setOpt("magconn", "aux", x.magConnAux);
  setOpt("magconn", "i2c_shared", x.magConnI2cShared); setOpt("magconn", "i2c", x.magConnI2c); setOpt("magconn", "spi", x.magConnSpi);
  setOpt("sleep", "enabled", x.enabled); setOpt("sleep", "disabled", x.disabled);
  setOpt("output", "bootloader", x.flashBoot); setOpt("output", "swd", x.flashSwd);
  setOpt("battery", "liion", x.batteryLiion); setOpt("battery", "nimh", x.batteryNimh); setOpt("battery", "none", x.batteryNone);
  setOpt("extra", "disabled", x.extraActOff); setOpt("extra", "enabled", x.extraActOn);
  setOpt("adc", "external", x.adcExternal); setOpt("adc", "internal", x.adcInternal);
  setOpt("ledpol", "high", x.ledPolHigh); setOpt("ledpol", "low", x.ledPolLow);
  setOpt("ledch", "1", x.ledCh1); setOpt("ledch", "2", x.ledCh2); setOpt("ledch", "3", x.ledCh3);
  ["featLed","featSw0","featClk","featVcc","featUart","featPwr"].forEach(id => { setOpt(id, "enabled", x.featOn); setOpt(id, "disabled", x.featOff); });
  setOpt("recvLedPol", "high", x.ledPolHigh); setOpt("recvLedPol", "low", x.ledPolLow);
  document.querySelectorAll(".langbar button[data-lang]").forEach(b => b.classList.toggle("on", b.dataset.lang === LANG));
  populateModules();
}

let MODULES = [];

function parsePin(p) {
  const m = /^P(\d)\.(\d+)$/.exec(p);
  return m ? { port: +m[1], pin: +m[2] } : null;
}

const SAVE_IDS = ["type","mod","bus","imu","magconn","sleep","output","ledpol","ledch","extra","battery","adc","featLed","featSw0","featClk","featVcc","featUart","featPwr","recvLedPol","adcPin","adcR1","adcR2","recvLed"];
function collectState() {
  const st = { v: 1, ctrl: {}, pins: {} };
  SAVE_IDS.forEach(id => { const e = document.getElementById(id); if (e) st.ctrl[id] = e.value; });
  document.querySelectorAll("#pins select").forEach(s => { if (s.value) st.pins[s.dataset.key] = s.value; });
  return st;
}
function persist() { try { localStorage.setItem("cfg", JSON.stringify(collectState())); } catch (e) {} }
function setVal(id, v) {
  const e = document.getElementById(id);
  if (!e || v === undefined || v === null) return;
  if (e.tagName === "SELECT" && ![...e.options].some(o => o.value === v)) return;
  e.value = v;
}
function applyState(st) {
  if (!st || !st.ctrl) return;
  const c = st.ctrl;
  setVal("type", c.type); populateModules();
  setVal("mod", c.mod);
  ["bus","imu","magconn","sleep","output","ledpol","ledch","extra","battery","adc","featLed","featSw0","featClk","featVcc","featUart","featPwr","recvLedPol","adcR1","adcR2"].forEach(id => setVal(id, c[id]));
  onChange();
  Object.keys(st.pins || {}).forEach(k => setVal("pin_" + k, st.pins[k]));
  ["adcPin","recvLed"].forEach(id => setVal(id, c[id]));
  render();
}
function exportConfig() {
  const blob = new Blob([JSON.stringify(collectState(), null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "slimenrf-config.json"; a.click();
  URL.revokeObjectURL(a.href);
}
function importConfig(e) {
  const f = e.target.files[0]; e.target.value = ""; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try { applyState(JSON.parse(r.result)); persist(); } catch (err) { alert(t().importErr); } };
  r.readAsText(f);
}
async function init() {
  MODULES = (await (await fetch("modules.json")).json()).modules;
  ["sleep","output","battery","ledpol","extra","recvLed","recvLedPol"].forEach(id => document.getElementById(id).addEventListener("change", () => { markDirty(); render(); }));
  ["bus","imu","magconn","ledch","featLed","featSw0","featClk","featVcc","featUart","featPwr"].forEach(id => document.getElementById(id).addEventListener("change", () => { markDirty(); onChange(); }));
  document.getElementById("adc").addEventListener("change", () => { markDirty(); updateAdc(); render(); });
  ["adcPin","adcR1","adcR2"].forEach(id => document.getElementById(id).addEventListener("change", () => { markDirty(); render(); }));
  document.getElementById("type").addEventListener("change", () => { markDirty(); populateModules(); onChange(); });
  document.getElementById("mod").addEventListener("change", () => { markDirty(); onChange(); });
  document.querySelectorAll(".langbar button[data-lang]").forEach(b => b.addEventListener("click", () => {
    LANG = b.dataset.lang; try { localStorage.setItem("lang", LANG); } catch (e) {}
    applyLang();
  }));
  document.getElementById("exportBtn").addEventListener("click", exportConfig);
  document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
  document.getElementById("importFile").addEventListener("change", importConfig);
  applyLang();
  let saved = null; try { saved = JSON.parse(localStorage.getItem("cfg") || "null"); } catch (e) {}
  if (saved && saved.ctrl) { try { applyState(saved); } catch (e) { try { localStorage.removeItem("cfg"); } catch (_) {} onChange(); } } else onChange();
}

function populateModules() {
  const type = document.getElementById("type").value;
  const modSel = document.getElementById("mod");
  const prev = modSel.value;
  modSel.innerHTML = "";
  MODULES.filter(m => type === "receiver" ? !!m.receiver : true).forEach(m => {
    const o = document.createElement("option");
    o.value = m.id;
    o.textContent = m.label + (m.experimental ? " · " + t().experimentalTag : "");
    modSel.appendChild(o);
  });
  if ([...modSel.options].some(o => o.value === prev)) modSel.value = prev;
}

function currentModule() { return MODULES.find(m => m.id === document.getElementById("mod").value); }

function ledChannels() {
  const mod = currentModule();
  if (!mod || mod.mcu === "nrf54l15") return 1;
  return parseInt(document.getElementById("ledch").value || "1", 10) || 1;
}
function ledFields() {
  const n = ledChannels();
  const f = [["led","pinLED"]];
  if (n >= 2) f.push(["led1","pinLED1"]);
  if (n >= 3) f.push(["led2","pinLED2"]);
  return f;
}
function updateLedCh() {
  const mod = currentModule();
  const sel = document.getElementById("ledch");
  const nrf54 = !!(mod && mod.mcu === "nrf54l15");
  ["2","3"].forEach(v => { const o = sel.querySelector('option[value="' + v + '"]'); if (o) o.disabled = nrf54; });
  if (nrf54 && sel.value !== "1") sel.value = "1";
}
function featOn(id) { const e = document.getElementById(id); return !!(e && e.value === "enabled"); }
function updateFeatVis() {
  const set = (id, on) => { const w = document.getElementById(id); if (!w) return; const el = w.querySelector("select"); if (el) el.disabled = !on; w.classList.toggle("off", !on); };
  set("wrapLedch", featOn("featLed")); set("wrapLedpol", featOn("featLed")); set("wrapExtra", featOn("featSw0"));
}
function pinFields(bus) {
  const base = bus === "i2c" ? [["sda","pinSDA"],["scl","pinSCL"]]
                             : [["sck","pinSCK"],["mosi","pinMOSI"],["miso","pinMISO"],["cs","pinCS"]];
  const f = base.concat([["int","pinINT"]]);
  if (featOn("featClk")) f.push(["clk","pinCLK"]);
  if (featOn("featLed")) ledFields().forEach(x => f.push(x));
  if (featOn("featSw0")) f.push(["sw0","pinSW0"]);
  if (featOn("featVcc")) f.push(["vcc","pinVCC"]);
  if (featOn("featUart")) f.push(["tx","pinTX"], ["rx","pinRX"]);
  if (featOn("featPwr")) f.push(["pwr","pinPWR"]);
  return f;
}

function magPinFields() {
  const mc = magConn();
  if (mc === "i2c") return [["mag_sda","pinMagSDA"],["mag_scl","pinMagSCL"]];
  if (mc === "spi") return [["mag_cs","pinMagCS"]];
  return [];
}

const NRF54L_PORTS = {
  sck:["1"], mosi:["1"], miso:["1"], sda:["1"], scl:["1"],
  cs:["0","1"], int:["0","1"], led:["1"], sw0:["0","1"],
  vcc:["0","1"], pwr:["0","1"], clk:["0","1"], tx:["0","1"], rx:["0","1"],
  mag_sda:["1"], mag_scl:["1"], mag_cs:["0","1"]
};
function allowedPins(mod, key) {
  const pins = mod.pins || [];
  if (mod.mcu !== "nrf54l15") return pins;
  const allow = NRF54L_PORTS[key];
  if (!allow) return pins;
  return pins.filter(p => { const m = /^P(\d)\./.exec(p); return m && allow.indexOf(m[1]) >= 0; });
}

const REQUIRED_PINS = ["sck","mosi","miso","cs","sda","scl","led","led1","led2"];
function buildPins() {
  const mod = currentModule();
  const bus = document.getElementById("bus").value;
  const host = document.getElementById("pins");
  const __prev = {}; document.querySelectorAll("#pins select").forEach(s => { if (s.value) __prev[s.dataset.key] = s.value; });
  host.innerHTML = "";
  const defs = (mod.defaults && mod.defaults[bus]) || {};
  const x = t();
  pinFields(bus).concat(magPinFields()).forEach(([key, i18nKey]) => {
    const wrap = document.createElement("div");
    const l = document.createElement("label"); l.dataset.i18n = i18nKey; l.textContent = x[i18nKey];
    const s = document.createElement("select"); s.id = "pin_" + key; s.dataset.key = key;
    if (!REQUIRED_PINS.includes(key)) { const none = document.createElement("option"); none.value = ""; none.textContent = "—"; s.appendChild(none); }
    allowedPins(mod, key).forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; s.appendChild(o); });
    if (__prev[key] !== undefined && [...s.options].some(o => o.value === __prev[key])) s.value = __prev[key];
    else if (defs[key]) s.value = defs[key];
    else if (REQUIRED_PINS.includes(key) && s.options.length) s.value = s.options[0].value;
    s.addEventListener("change", () => { markDirty(); render(); });
    wrap.appendChild(l); wrap.appendChild(s); host.appendChild(wrap);
  });
}

function populateRecvLed() {
  const mod = currentModule();
  const sel = document.getElementById("recvLed");
  const prev = sel.value;
  sel.innerHTML = "";
  const off = document.createElement("option"); off.value = "none"; off.textContent = "—"; sel.appendChild(off);
  (mod.pins || []).forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; sel.appendChild(o); });
  if ([...sel.options].some(o => o.value === prev)) sel.value = prev;
  else if ([...sel.options].some(o => o.value === "P0.15")) sel.value = "P0.15";
}

function updateAdc() {
  const mod = currentModule();
  const ains = (mod && mod.analog_pins) || [];
  const adcSel = document.getElementById("adc");
  const extOpt = adcSel.querySelector('option[value="external"]');
  const pinSel = document.getElementById("adcPin");
  const prev = pinSel.value;
  pinSel.innerHTML = "";
  ains.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; pinSel.appendChild(o); });
  if (mod && mod.adc_default && ains.indexOf(mod.adc_default) >= 0) pinSel.value = mod.adc_default;
  else if ([...pinSel.options].some(o => o.value === prev)) pinSel.value = prev;
  if (ains.length === 0) { extOpt.disabled = true; if (adcSel.value === "external") adcSel.value = "internal"; }
  else { extOpt.disabled = false; }
  const ext = adcSel.value === "external" && ains.length > 0;
  document.getElementById("adcFields").style.display = ext ? "" : "none";
}

function collectPins() {
  const pins = {};
  document.querySelectorAll("#pins select").forEach(s => { if (!s.disabled && s.value) pins[s.dataset.key] = s.value; });
  if (!featOn("featLed")) pins.led = "none";
  return pins;
}

function nrfPsel(func, p) { const q = parsePin(p); return q ? `NRF_PSEL(${func}, ${q.port}, ${q.pin})` : `/* ${func}: ? */`; }
function gpioRef(p, flags) { const q = parsePin(p); return q ? `<&gpio${q.port} ${q.pin} ${flags}>` : "< ? >"; }

function renderOverlay(pins, bus, imu, mag) {
  const L = [];
  L.push("&pinctrl {");
  if (bus === "i2c") {
    L.push(`    i2c0_default { group1 { psels = <${nrfPsel("TWIM_SDA", pins.sda)}>, <${nrfPsel("TWIM_SCL", pins.scl)}>; bias-disable; }; };`);
    L.push(`    i2c0_sleep  { group1 { psels = <${nrfPsel("TWIM_SDA", pins.sda)}>, <${nrfPsel("TWIM_SCL", pins.scl)}>; bias-disable; low-power-enable; }; };`);
  } else {
    const grp = `<${nrfPsel("SPIM_MISO", pins.miso)}>, <${nrfPsel("SPIM_MOSI", pins.mosi)}>, <${nrfPsel("SPIM_SCK", pins.sck)}>`;
    L.push(`    spi3_default { group1 { psels = ${grp}; }; };`);
    L.push(`    spi3_sleep  { group1 { psels = ${grp}; low-power-enable; }; };`);
  }
  if (pins.led) {
    L.push(`    pwm0_default { group1 { psels = <${nrfPsel("PWM_OUT0", pins.led)}>; nordic,drive-mode = <NRF_DRIVE_D0S1>; }; };`);
    L.push(`    pwm0_sleep  { group1 { psels = <${nrfPsel("PWM_OUT0", pins.led)}>; low-power-enable; }; };`);
  }
  L.push("};");
  if (bus === "spi" && pins.cs) L.push(`&spi3 { cs-gpios = ${gpioRef(pins.cs, "GPIO_ACTIVE_LOW")}; };`);
  L.push("/ {");
  L.push("    zephyr,user {");
  L.push(`        int0-gpios = ${gpioRef(pins.int, "0")};`);
  if (pins.led) L.push(`        led-gpios = ${gpioRef(pins.led, "GPIO_OPEN_SOURCE")};`);
  if (pins.clk) L.push(`        clk-gpios = ${gpioRef(pins.clk, "GPIO_OPEN_DRAIN")};`);
  if (pins.vcc) L.push(`        vcc-gpios = ${gpioRef(pins.vcc, "0")};`);
  L.push("    };");
  if (pins.sw0) L.push("    aliases { sw0 = &button0; };");
  L.push("};");
  L.push(`/* IMU: ${imu}${mag !== "none" ? " | Mag: " + mag : ""} */`);
  return L.join("\n");
}

function onChange() {
  const cp = document.getElementById("confirmOverlay"); if (cp) cp.style.display = "none";
  const mod = currentModule();
  const type = document.getElementById("type").value;
  const isRecv = type === "receiver";
  const supported = mod && mod.supported;
  const x = t();

  document.getElementById("trackerOpts").style.display = (!supported || isRecv) ? "none" : "";
  document.getElementById("recvNote").style.display = (supported && isRecv) ? "" : "none";
  document.getElementById("recvOpts").style.display = (supported && isRecv) ? "" : "none";
  const un = document.getElementById("unsupported");
  if (!supported) { un.style.display = ""; un.textContent = (mod && mod.note) || x.unsupportedBtn; }
  else un.style.display = "none";

  updateButton();

  if (supported) updateFlash();
  if (supported && isRecv) populateRecvLed();
  if (supported && !isRecv) updateMagConn();
  if (supported && !isRecv) { updateLedCh(); updateFeatVis(); }
  if (supported && !isRecv) { buildPins(); updateAdc(); }
  render();
}

const FUNC_META = {
  sda:{label:"SDA",color:"#2f9e44"}, scl:{label:"SCL",color:"#e0902a"},
  sck:{label:"SCK",color:"#e0902a"}, mosi:{label:"MOSI",color:"#2f9e44"},
  miso:{label:"MISO",color:"#3b82c4"}, cs:{label:"CS",color:"#9c5a2a"},
  int:{label:"INT",color:"#4bb543"}, clk:{label:"CLK",color:"#17a2a2"},
  led:{label:"LED",color:"#d4537e"}, sw0:{label:"SW0",color:"#b0952a"}, vcc:{label:"VCC",color:"#c0398f"},
  tx:{label:"TX",color:"#6d6df0"}, rx:{label:"RX",color:"#8a63d2"}, pwr:{label:"PWR",color:"#c0392b"},
  mag_sda:{label:"M-SDA",color:"#2f9e44"}, mag_scl:{label:"M-SCL",color:"#e0902a"}, mag_cs:{label:"M-CS",color:"#9c5a2a"}
};
const SVGNS = "http://www.w3.org/2000/svg";
function svgEl(n, a) { const e = document.createElementNS(SVGNS, n); for (const k in a) e.setAttribute(k, a[k]); return e; }

function drawBoard(pins) {
  const svg = document.getElementById("board");
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const mod = currentModule();
  const layout = mod && mod.layout;
  if (!layout) {
    const tx = svgEl("text", { x: 260, y: 280, "text-anchor": "middle", fill: "#7f8794", "font-size": "13" });
    tx.textContent = t().noDiagram; svg.appendChild(tx); return;
  }
  const g2f = {};
  for (const key in (pins || {})) { if (FUNC_META[key] && pins[key]) g2f[pins[key]] = FUNC_META[key]; }

  const BX = 150, BW = 220, BY = 24, BH = 306;
  const a = (dx, dy) => (BX + dx) + " " + (BY + dy);
  svg.appendChild(svgEl("rect", { x: BX, y: BY, width: BW, height: BH, rx: 12, fill: "#161616" }));
  const ant = "M" + a(18, 54) + " L" + a(18, 26) + " L" + a(BW - 18, 26) + " L" + a(BW - 18, 50) + " L" + a(48, 50) + " L" + a(48, 38) + " L" + a(BW - 34, 38);
  svg.appendChild(svgEl("path", { d: ant, fill: "none", stroke: "#d9a441", "stroke-width": "8" }));
  svg.appendChild(svgEl("rect", { x: BX + 14, y: BY + 66, width: BW - 28, height: BH - 84, rx: 8, fill: "#dfe1e4", stroke: "#a9adb4", "stroke-width": "1.5" }));
  svg.appendChild(svgEl("circle", { cx: BX + 30, cy: BY + 82, r: 5, fill: "#161616" }));
  const lbl = svgEl("text", { x: BX + BW / 2, y: BY + BH / 2 + 4, "text-anchor": "middle", fill: "#6a6e75", "font-size": "13", "font-family": "monospace" });
  lbl.textContent = mod.id; svg.appendChild(lbl);

  const padTop = BY + 72, padBot = BY + BH - 16, step = (padBot - padTop) / 13;
  function side(list, isL) {
    list.forEach(function (item, i) {
      const name = item[1], y = padTop + i * step, edgeX = isL ? BX : BX + BW;
      const isGpio = /^P\d\.\d+$/.test(name);
      const f = isGpio ? g2f[name] : null;
      const padFill = f ? f.color : (isGpio ? "#e6b73c" : "#7a7f88");
      svg.appendChild(svgEl("rect", { x: edgeX - 9, y: y - 6, width: 18, height: 12, rx: 3, fill: padFill, stroke: "#0e0e0e", "stroke-width": "1" }));
      const gx = isL ? edgeX + 14 : edgeX - 14;
      const gt = svgEl("text", { x: gx, y: y + 3.5, "text-anchor": isL ? "start" : "end", fill: "#9aa0ab", "font-size": "10", "font-family": "monospace" });
      gt.textContent = name; svg.appendChild(gt);
      if (f) {
        const lineX = isL ? edgeX - 9 : edgeX + 9, endX = isL ? 92 : BX + BW + 82;
        svg.appendChild(svgEl("line", { x1: lineX, y1: y, x2: endX, y2: y, stroke: f.color, "stroke-width": "2.5" }));
        const w = f.label.length * 8 + 16, pxp = isL ? endX - w : endX;
        svg.appendChild(svgEl("rect", { x: pxp, y: y - 10, width: w, height: 20, rx: 10, fill: f.color }));
        const ft = svgEl("text", { x: pxp + w / 2, y: y + 4, "text-anchor": "middle", fill: "#0e1116", "font-size": "12", "font-weight": "600" });
        ft.textContent = f.label; svg.appendChild(ft);
      }
    });
  }
  side(layout.left, true); side(layout.right, false);
}

function render() {
  persist();
  const type = document.getElementById("type").value;
  if (type === "receiver") { document.getElementById("dts").textContent = ""; drawBoard({}); refreshValidation(); return; }
  const used = {};
  document.querySelectorAll("#pins select").forEach(s => { s.style.outline = ""; if (!s.disabled && s.value) { used[s.value] = (used[s.value]||0)+1; } });
  document.querySelectorAll("#pins select").forEach(s => { if (!s.disabled && s.value && used[s.value] > 1) s.style.outline = "2px solid var(--err)"; });
  const pins = collectPins();
  drawBoard(pins);
  document.getElementById("dts").textContent = renderOverlay(pins, document.getElementById("bus").value,
    document.getElementById("imu").value, magConn());
  refreshValidation();
}

function flashMethod() {
  const s = document.getElementById("output");
  return (s && s.value) || "swd";
}
function updateFlash() {
  const mod = currentModule(); if (!mod) return;
  const isRecv = document.getElementById("type").value === "receiver";
  const hasUsb = !!mod.has_usb;
  const sel = document.getElementById("output");
  const boot = sel.querySelector('option[value="bootloader"]');
  const swd = sel.querySelector('option[value="swd"]');
  boot.disabled = !(isRecv || hasUsb);
  swd.disabled = isRecv;
  const cur = sel.querySelector('option[value="' + sel.value + '"]');
  if (!cur || cur.disabled) sel.value = isRecv ? "bootloader" : (hasUsb ? (mod.flash_default || "swd") : "swd");
}

const MAG_AUX_IMUS = ["LSM6DSV", "LSM6DSO", "LSM6DSM", "ISM330BX"];
function magConn() {
  const s = document.getElementById("magconn");
  return (s && s.value) || "none";
}
function updateMagConn() {
  const sel = document.getElementById("magconn");
  const imu = document.getElementById("imu").value;
  const bus = document.getElementById("bus").value;
  const opt = v => sel.querySelector('option[value="' + v + '"]');
  opt("aux").disabled = !(bus === "spi" && MAG_AUX_IMUS.indexOf(imu) >= 0);
  opt("i2c_shared").disabled = bus !== "i2c";
  opt("spi").disabled = bus !== "spi";
  const cur = sel.querySelector('option[value="' + sel.value + '"]');
  if (!cur || cur.disabled) sel.value = "none";
}

function collectConfig() {
  const mod = currentModule();
  const type = document.getElementById("type").value;
  const bus = document.getElementById("bus").value;
  const imu = document.getElementById("imu").value;
  const mconn = magConn();
  const isRecv = type === "receiver";
  const src = isRecv ? (mod.receiver || mod) : mod;
  const noBusVariant = mod.mcu === "nrf54l15";
  const board_target = (isRecv || noBusVariant) ? mod.base_board : (mod.base_board + "/" + bus);
  const parts = ["SlimeNRF", mod.id, isRecv ? "Receiver" : "Tracker"];
  if (!isRecv) { parts.push(imu); parts.push(bus.toUpperCase()); if (mconn !== "none") parts.push("Mag"); }
  const fm = flashMethod();
  return {
    module: mod.id,
    mcu: mod.mcu,
    type: isRecv ? "receiver" : "tracker",
    base_board: mod.base_board,
    board_target,
    repository_url: src.repository_url,
    repository_revision: src.repository_revision,
    sdk_url: mod.sdk_url,
    sdk_revision: mod.sdk_revision,
    zephyr_sdk_version: mod.zephyr_sdk_version,
    flash_method: fm,
    fileformat: fm === "bootloader" ? "uf2" : "hex",
    filename: parts.join("_"),
    bus, imu, mag_conn: mconn,
    pins: isRecv ? (document.getElementById("recvLed").value ? { led: document.getElementById("recvLed").value } : {}) : collectPins(),
    options: {
      magnetometer: (!isRecv && mconn !== "none") ? "enabled" : "disabled",
      mag_conn: mconn,
      sleep: document.getElementById("sleep").value,
      extra_actions: (!isRecv) ? document.getElementById("extra").value : "disabled",
      battery: document.getElementById("battery").value,
      adc: (!isRecv && document.getElementById("adc").value === "external" && ((mod.analog_pins || []).length > 0)) ? "external" : "internal",
      adc_pin: document.getElementById("adcPin").value,
      adc_r1: parseInt(document.getElementById("adcR1").value || "0", 10) || 0,
      adc_r2: parseInt(document.getElementById("adcR2").value || "0", 10) || 0,
      led_polarity: (isRecv ? document.getElementById("recvLedPol") : document.getElementById("ledpol")).value,
      led_channels: isRecv ? 1 : ledChannels()
    }
  };
}

const statusEl = document.getElementById("status");
const goBtn = document.getElementById("go");
const progWrap = document.getElementById("progress");
const progBar = document.getElementById("progressBar");
function setStatus(html, cls="") { statusEl.className = cls; statusEl.innerHTML = html; }
function setProg(pct, color) { progWrap.style.display = "block"; progBar.style.width = Math.max(0, Math.min(100, pct)) + "%"; progBar.style.background = color || "var(--accent)"; }
function hideProg() { progWrap.style.display = "none"; progBar.style.width = "0%"; }
function esc(s) { return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
function stepIcon(s) {
  if (s.status === "completed") return s.conclusion === "success" ? "✓" : (s.conclusion === "skipped" ? "·" : "✗");
  if (s.status === "in_progress") return "⏳";
  return "·";
}
function renderLog(steps, runUrl) {
  const box = document.getElementById("logBox"), link = document.getElementById("logLink");
  if (steps && steps.length) {
    box.style.display = "block";
    box.innerHTML = steps.map(s => stepIcon(s) + " " + esc(s.name)).join("<br>");
    box.scrollTop = box.scrollHeight;
  }
  if (runUrl) {
    link.style.display = "block";
    link.innerHTML = '<a href="' + runUrl + '" target="_blank" rel="noopener" style="color:var(--accent);">' + t().viewLog + '</a>';
  }
}
function hideLog() { const b = document.getElementById("logBox"), l = document.getElementById("logLink"); b.style.display = "none"; b.innerHTML = ""; l.style.display = "none"; l.innerHTML = ""; }

let buildMode = "build";
let dlUrl = "", dlName = "";

function updateButton() {
  const mod = currentModule();
  const supported = mod && mod.supported;
  if (buildMode === "download") {
    goBtn.textContent = "⬇ " + t().download + (dlName ? " " + dlName : "");
    goBtn.style.background = "var(--ok)";
    goBtn.disabled = false;
  } else if (buildMode === "building") {
    goBtn.textContent = t().building + " …";
    goBtn.style.background = "var(--accent)";
    goBtn.disabled = true;
  } else {
    goBtn.textContent = supported ? t().build : t().unsupportedBtn;
    goBtn.style.background = "var(--accent)";
    goBtn.disabled = !supported || validationBlocked;
  }
}

function markDirty() {
  if (buildMode === "download") {
    buildMode = "build";
    dlUrl = ""; dlName = "";
    hideProg(); setStatus("");
    updateButton();
  }
}

let validationBlocked = false;
function validate() {
  const errors = [];
  if (document.getElementById("type").value !== "tracker") return errors;
  const mod = currentModule();
  if (!mod || !mod.supported) return errors;
  const pins = collectPins();
  const bus = document.getElementById("bus").value;
  const counts = {};
  Object.values(pins).forEach(v => counts[v] = (counts[v] || 0) + 1);
  if (Object.values(counts).some(c => c > 1)) errors.push(t().errDup);
  if (document.getElementById("sleep").value === "enabled" && !pins.int) errors.push(t().errINT);
  if (bus === "i2c" && (!pins.sda || !pins.scl)) errors.push(t().errI2C);
  if (bus === "spi" && (!pins.sck || !pins.mosi || !pins.miso || !pins.cs)) errors.push(t().errSPI);
  return errors;
}
function refreshValidation() {
  const advEl = document.getElementById("adv");
  const adv = advEl && advEl.checked;
  const errors = validate();
  const warnEl = document.getElementById("warn");
  if (errors.length) {
    validationBlocked = !adv;
    warnEl.textContent = (adv ? "⚠ " : "❌ ") + errors.join("；") + (adv ? " " + t().advNote : "");
    warnEl.style.color = adv ? "var(--accent)" : "var(--err)";
  } else {
    validationBlocked = false;
    warnEl.textContent = "";
  }
  if (buildMode === "build") updateButton();
}

function showConfirm() {
  const cfg = collectConfig();
  const rows = [["Module", cfg.module], ["Type", cfg.type]];
  if (cfg.type === "tracker") {
    rows.push(["IMU", cfg.imu]);
    if (cfg.mag_conn && cfg.mag_conn !== "none") rows.push(["Mag", cfg.mag_conn]);
    rows.push(["Bus", cfg.bus.toUpperCase()]);
    rows.push(["Battery", cfg.options.battery]);
    rows.push(["ADC", cfg.options.adc === "external" ? cfg.options.adc_pin + " (R1 " + cfg.options.adc_r1 + "k / R2 " + cfg.options.adc_r2 + "k)" : "VDDHDIV5"]);
    Object.keys(cfg.pins).forEach(k => rows.push([k.toUpperCase(), cfg.pins[k]]));
  }
  rows.push(["Flashing", cfg.flash_method === "bootloader" ? "Bootloader (.uf2 + .hex)" : "Direct SWD (.hex)"]);
  document.getElementById("confirmSummary").innerHTML =
    rows.map(r => '<div>' + r[0] + ': <span style="color:#e7e9ee">' + r[1] + '</span></div>').join("");
  document.getElementById("force").checked = false;
  document.getElementById("confirmOverlay").style.display = "flex";
}

async function doBuild(force) {
  const x = t();
  document.getElementById("confirmOverlay").style.display = "none";
  buildMode = "building"; updateButton();
  setStatus('<span class="spinner"></span>' + x.sending);
  setProg(8); hideLog();
  try {
    const body = collectConfig(); body.force = !!force;
    const res = await fetch(WORKER_URL + "/build", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "error");
    if (data.status === "done" && data.download_url) {
      setProg(100, "var(--ok)");
      buildMode = "download"; dlUrl = data.download_url; dlName = data.filename; updateButton();
      setStatus("♻ " + x.cached, "");
      hideLog();
      return;
    }
    poll(data.build_id);
  } catch (e) { setStatus("❌ " + e.message, "err"); hideProg(); buildMode = "build"; updateButton(); }
}

async function poll(buildId) {
  const started = Date.now(), TIMEOUT = 20 * 60 * 1000, EXPECTED = 8 * 60 * 1000;
  const tick = async () => {
    const x = t();
    const elapsed = Date.now() - started;
    if (elapsed > TIMEOUT) { setStatus("⌛ " + x.timeout, "err"); buildMode = "build"; updateButton(); return; }
    try {
      const data = await (await fetch(WORKER_URL + "/status?build_id=" + buildId)).json();
      if (data.status === "done") {
        setProg(100, "var(--ok)");
        buildMode = "download"; dlUrl = data.download_url; dlName = data.filename;
        updateButton();
        setStatus("✅ " + x.done, "");
        hideLog();
        return;
      }
      if (data.status === "failed") {
        setProg(100, "var(--err)");
        setStatus("❌ " + x.failed, "err");
        renderLog(data.steps, data.run_url);
        buildMode = "build"; updateButton(); return;
      }
      if (data.status === "queued") { setProg(15); setStatus('<span class="spinner"></span>' + x.queued + " …"); }
      else { setProg(Math.min(92, 20 + (elapsed / EXPECTED) * 72)); setStatus('<span class="spinner"></span>' + x.building + " … " + x.buildHint); }
      renderLog(data.steps, data.run_url);
      setTimeout(tick, 6000);
    } catch (e) { setTimeout(tick, 6000); }
  };
  tick();
}

goBtn.addEventListener("click", () => {
  if (buildMode === "download" && dlUrl) { window.open(dlUrl, "_blank"); return; }
  if (buildMode === "building") return;
  showConfirm();
});
document.getElementById("confirmYes").addEventListener("click", () => doBuild(document.getElementById("force").checked));
document.getElementById("confirmNo").addEventListener("click", () => { document.getElementById("confirmOverlay").style.display = "none"; });
document.getElementById("confirmOverlay").addEventListener("click", (e) => { if (e.target.id === "confirmOverlay") e.currentTarget.style.display = "none"; });
document.getElementById("adv").addEventListener("change", refreshValidation);
init();
</script>
