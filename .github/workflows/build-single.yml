name: Build Single Firmware

on:
  workflow_dispatch:
    inputs:
      config:
        required: true
        type: string
      build_id:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: build-${{ github.event.inputs.build_id }}
  cancel-in-progress: false

env:
  BUILD_ID: ${{ github.event.inputs.build_id }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate build_id
        run: |
          echo "$BUILD_ID" | grep -Eq '^[a-f0-9]{6,40}$' || { echo "invalid build_id"; exit 1; }

      - name: Parse config
        id: cfg
        env:
          CONFIG_JSON: ${{ github.event.inputs.config }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$CONFIG_JSON" | jq . > /dev/null
          get() { echo "$CONFIG_JSON" | jq -r "$1"; }
          {
            echo "type=$(get '.type')"
            echo "board_target=$(get '.board_target')"
            echo "repository_url=$(get '.repository_url')"
            echo "repository_revision=$(get '.repository_revision')"
            echo "sdk_url=$(get '.sdk_url')"
            echo "sdk_revision=$(get '.sdk_revision')"
            echo "zephyr_sdk_version=$(get '.zephyr_sdk_version')"
            echo "fileformat=$(get '.fileformat')"
          echo "source=$(get '.source // "official"')"
            echo "filename=$(get '.filename')"
            echo "magnetometer=$(get '.options.magnetometer // "unset"')"
            echo "sleep=$(get '.options.sleep // "unset"')"
            echo "battery=$(get '.options.battery // "unset"')"
            echo "clk_pin=$(get '.pins.clk // ""')"
            echo "pwr_pin=$(get '.pins.pwr // ""')"
            echo "extra_actions=$(get '.options.extra_actions // "unset"')"
            echo "led_type=$(get '.options.led_type // "single"')"
            echo "tx_pin=$(get '.pins.tx // ""')"
          } >> "$GITHUB_OUTPUT"

      - name: Create placeholder release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="fw-${BUILD_ID}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            for a in $(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name'); do
              gh release delete-asset "$TAG" "$a" -y --repo "$GITHUB_REPOSITORY" || true
            done
            gh release edit "$TAG" --notes "STATUS:BUILDING" --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "STATUS:BUILDING" --prerelease
          fi

      - name: Install apt dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: >-
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler wget
            python3-dev python3-pip python3-setuptools python3-tk python3-wheel python3-venv
            xz-utils file make gcc gcc-multilib g++-multilib libsdl2-dev libmagic1
          version: 1.0

      - name: Install Zephyr SDK
        run: |
          VER="${{ steps.cfg.outputs.zephyr_sdk_version }}"
          wget -q -O zephyr-sdk.tar.xz \
            "https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${VER}/zephyr-sdk-${VER}_linux-x86_64_minimal.tar.xz"
          tar xf zephyr-sdk.tar.xz -C ~/
          rm -rf ~/zephyr-sdk && mv ~/zephyr-sdk-*/ ~/zephyr-sdk
          ~/zephyr-sdk/setup.sh -c -t arm-zephyr-eabi

      - name: Setup Python venv + west
        run: |
          python3 -m venv ~/.venv
          ~/.venv/bin/pip install --quiet west ninja

      - name: Initialise Zephyr workspace
        run: |
          export PATH="$HOME/.venv/bin:$PATH"
          mkdir -p zephyr-workspace/manifest
          cat > zephyr-workspace/manifest/west.yml <<YAML
          manifest:
            version: "0.10"
            projects:
              - name: sdk-nrf
                path: nrf
                url: ${{ steps.cfg.outputs.sdk_url }}
                revision: ${{ steps.cfg.outputs.sdk_revision }}
                import: true
          YAML
          cd zephyr-workspace
          west init -l manifest
          west update --narrow -o=--depth=1
          west zephyr-export
          ~/.venv/bin/pip install --quiet -r zephyr/scripts/requirements.txt

      - name: Clone firmware source
        id: clone
        run: |
          cd zephyr-workspace
          git clone --filter=blob:none "${{ steps.cfg.outputs.repository_url }}" SlimeVR-Tracker-nRF
          git -C SlimeVR-Tracker-nRF checkout "${{ steps.cfg.outputs.repository_revision }}"
          git -C SlimeVR-Tracker-nRF submodule update --init --recursive --depth 1
          echo "fw_sha=$(git -C SlimeVR-Tracker-nRF rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate board overlay
        id: overlay
        env:
          CONFIG_JSON: ${{ github.event.inputs.config }}
        shell: bash
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/zephyr-workspace/slimenrf_custom.overlay"
          python3 "$GITHUB_WORKSPACE/.github/scripts/gen_overlay.py" "$CONFIG_JSON" > "$OUT"
          cat "$OUT"
          if [ -s "$OUT" ]; then echo "overlay_path=$OUT" >> "$GITHUB_OUTPUT"; fi

      - name: Apply firmware options
        if: ${{ steps.cfg.outputs.type == 'tracker' }}
        shell: bash
        run: |
          set -euo pipefail
          cd zephyr-workspace/SlimeVR-Tracker-nRF
          append() { printf "\n\n%s" "$1" >> prj.conf; }
          MAG='${{ steps.cfg.outputs.magnetometer }}'
          SLEEP='${{ steps.cfg.outputs.sleep }}'
          BAT='${{ steps.cfg.outputs.battery }}'
          FMT='${{ steps.cfg.outputs.fileformat }}'
          BOARD='${{ steps.cfg.outputs.board_target }}'
          SRC_PROF='${{ steps.cfg.outputs.source }}'
          # jiting fork: SWD 直燒 (hex) + MCUboot 對應。uf2 只給有 adafruit bootloader 的板 (本專案模組無 USB -> 不適用)
          if [ "$SRC_PROF" = "jiting" ] && [ "$FMT" = "uf2" ]; then
            echo "ERROR: jiting source supports hex (SWD) or mcuboot; uf2 not applicable" >&2
            exit 1
          fi
          append 'CONFIG_VOLTAGE_DIVIDER=n'   # redundant Zephyr voltage sensor: the firmware reads the ADC itself. Its init returns -ENOTSUP on NCS 3.2 (both nRF52 and nRF54L) -> 'voltage_init: setup: -134'
          if [ "$FMT" = "hex" ]; then
            # SWD 直燒、無 bootloader:code-partition 由 overlay 定在 0x0,確保用 DT 分割
            append 'CONFIG_USE_DT_CODE_PARTITION=y'
            append 'CONFIG_BUILD_OUTPUT_UF2=n'
          fi
          case "$BOARD" in
            *nrf54l*)
              append 'CONFIG_MAIN_STACK_SIZE=2048'   # nRF54L M33+FPU+TrustZone needs more than upstream 512 (upstream: "crashing on nrf54l at 512")
              # jiting も同じ差し替え: fork の board.c は P1.07/P1.08 ハードコード
              # (fork 自社ボード専用) -> ユーザーボードでは IMU が無電源になる。
              # 差し替え版は DT vcc/gnd-gpios 読み + NFC パッド解放 + EARLY 電源自锁。
              cp "$GITHUB_WORKSPACE/.github/scripts/test54l_board.c" boards/nordic/test54l/board.c && echo "test54l board.c -> reads DT vcc/gnd-gpios"
              ;;
            *)
              # nRF52 (has_usb=false modules): disable USB so USB_EXISTS is false and the
              # SlimeNRF console is not USB-insertion-gated -> it auto-starts over UART/RTT.
              append 'CONFIG_USB_DEVICE_STACK=n'
              [ "$SRC_PROF" = "jiting" ] && append 'CONFIG_USB_DEVICE_STACK_NEXT=n'   # jiting fork 走新 USB 堆疊
              [ "$SRC_PROF" = "jiting" ] || NEED_PWR_EARLY=1   # nRF54L already latches in test54l_board.c; nRF52 has no board-level latch (jiting: 錨點不同, v1 先跳過)
              ;;
          esac
          sed -i 's|SPI_DT_SPEC_GET(\([^,]*,[[:space:]]*SPI_OP\))|SPI_DT_SPEC_GET(\1, 0)|g' src/sensor/sensor.c || true
          if [ "$SRC_PROF" = "jiting" ]; then
            echo "jiting: skip SENSOR_USE_MAG (fork uses driver whitelist instead)"
            [ "$MAG" = "enabled" ] && echo "WARN: magnetometer with jiting source not wired up yet" >&2
          else
            [ "$MAG" = "enabled" ]  && append 'CONFIG_SENSOR_USE_MAG=y'
            [ "$MAG" = "disabled" ] && append 'CONFIG_SENSOR_USE_MAG=n'
          fi
          if [ "$SLEEP" = "enabled" ]; then
            append 'CONFIG_USE_IMU_WAKE_UP=y'
            [ "$SRC_PROF" = "jiting" ] || append 'CONFIG_USE_ACTIVE_TIMEOUT=y'
          elif [ "$SLEEP" = "disabled" ]; then
            append 'CONFIG_USE_IMU_WAKE_UP=n'
            if [ "$SRC_PROF" != "jiting" ]; then
              # jiting fork: USE_ACTIVE_TIMEOUT を n にすると ACTIVE_TIMEOUT_DELAY が
              # 未定義になり sensor.c がコンパイル不能 (fork 側の未ガード箇所)。
              # fork ではデフォルト値のままにする
              append 'CONFIG_USE_ACTIVE_TIMEOUT=n'
              append 'CONFIG_SENSOR_LP_TIMEOUT=300000'; append 'CONFIG_SENSOR_USE_LOW_POWER_2=n'
            fi
          fi
          CLK='${{ steps.cfg.outputs.clk_pin }}'
          if [ "$SRC_PROF" = "jiting" ]; then
            echo "jiting: skip USE_SENSOR_CLOCK (fork auto-detects via DT clk_gpios)"
          elif [ -n "$CLK" ]; then append 'CONFIG_USE_SENSOR_CLOCK=y'; else append 'CONFIG_USE_SENSOR_CLOCK=n'; fi
          TXP='${{ steps.cfg.outputs.tx_pin }}'
          if [ -n "$TXP" ]; then append 'CONFIG_LOG_BACKEND_UART_AUTOSTART=y'; fi   # no-USB boards: nothing else starts the UART log backend
          EXTRA='${{ steps.cfg.outputs.extra_actions }}'
          if [ "$EXTRA" = "enabled" ]; then append 'CONFIG_USER_EXTRA_ACTIONS=y'; elif [ "$EXTRA" = "disabled" ]; then append 'CONFIG_USER_EXTRA_ACTIONS=n'; fi
          LEDT='${{ steps.cfg.outputs.led_type }}'
          if [ "$LEDT" = "strip" ]; then append 'CONFIG_LED_STRIP=y'; append 'CONFIG_WS2812_STRIP_SPI=y'; fi
          if [ "$BAT" = "nimh" ]; then
            if [ "$SRC_PROF" = "jiting" ]; then
              # NiMH 曲線は patch_jiting_battery.py が battery.c に直接移植する。
              # NO_MAPPING は Kconfig choice を満たすだけ (置換後 levels[] は無条件になる)
              append 'CONFIG_BATTERY_NO_MAPPING=y'
            else
              python3 "$GITHUB_WORKSPACE/.github/scripts/patch_nimh.py"
            fi
          elif [ "$BAT" = "none" ]; then
            append 'CONFIG_BATTERY_NO_MAPPING=y'
          elif [ "$BAT" = "liion" ]; then
            case "$BOARD" in
              *nrf54l*) append 'CONFIG_BATTERY_USE_REG_LDO_MAPPING=y' ;;
            esac
          fi
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_pwr.py"
          if [ "$SRC_PROF" = "jiting" ]; then
            if [ "${BOARD#*nrf54l}" = "$BOARD" ]; then
              # jiting の socs/ は SoC 名キー (fork の sysbuild.cmake の fallback 前提)。
              # --no-sysbuild の素の Zephyr は <qualifiers> 名 (nrf52840_spi 等) しか
              # 探さない -> retained_mem 未定義でビルド失敗。qualifiers 名 shim を追加。
              printf '#include "nrf52840.overlay"\n' > socs/nrf52840_spi.overlay
              printf '#include "nrf52840.overlay"\n' > socs/nrf52840_i2c.overlay
              echo "jiting 52840: added socs qualifier shims (nrf52840_spi/_i2c -> nrf52840.overlay)"
            fi
            # jiting fork: prj.conf は LOG_BACKEND_UART_AUTOSTART=n (USB CDC 挿入で起動する設計)。
            # USB 無しモジュールでは誰も backend を起こさない -> UART ログが一切出ない。自動起動に戻す。
            append 'CONFIG_LOG_BACKEND_UART_AUTOSTART=y'
            # fork は CONFIG_ADC_LOG_LEVEL_OFF=y で電池 setup エラーを黙殺する。
            # WRN: setup 失敗は見える / battery_sample の 100ms 毎 INF スパムは出ない
            append 'CONFIG_ADC_LOG_LEVEL_WRN=y'
            # 電池修正: input_positive 1+AIN (fork bug) + nimh なら公式 NiMH 三点セット移植
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_jiting_battery.py" "$BAT"
            # 単押しリブート廃止 (現行公式に整合、誤押し -> 再同期問題の連鎖を断つ)
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_jiting_button.py"
            # jiting fork: led.c が RGB カラー表を無条件参照 -> LED_RGB_COLOR 必須
            # (fork のボードは全て WS2812 前提。TRI_COLOR だと COLOR_R/G/B 未定義でビルド不能)
            append 'CONFIG_LED_RGB_COLOR=y'
            # jiting fork: 無線/電池/ADC 相關 patch 全部不適用 (fork 已重寫該區塊)
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_uart_console_jiting.py"
            case "$BOARD" in
              *nrf54l*)
                # fork の OTA 適用エンジンは nRF52 専用 (NVMC) -> 54L 用にガード
                python3 "$GITHUB_WORKSPACE/.github/scripts/patch_jiting_54l.py"
                # esb_ota_flash.c が要求する chosen が test54l DT に無い -> 補う
                printf '\n/ { chosen { zephyr,flash-controller = &rram_controller; }; };\n' >> "$GITHUB_WORKSPACE/zephyr-workspace/slimenrf_custom.overlay"
                printf '\n&wdt31 { status = "okay"; };\n' >> "$GITHUB_WORKSPACE/zephyr-workspace/slimenrf_custom.overlay"
                echo "jiting 54L: appended flash-controller chosen + wdt31 enable to custom overlay"
                ;;
            esac
            tail -n 10 prj.conf
            exit 0
          fi
          if [ "${NEED_PWR_EARLY:-0}" = "1" ]; then
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_pwr_early.py"   # nRF52 only: latch power at PRE_KERNEL_1 via raw HAL (short-press boot)
          fi
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_temp.py"
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_batt.py"
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_adcgain.py"   # nRF54L SAADC has no 1/6 or 1/5 gain (min is 1/4); upstream picks 1/6 -> adc_channel_setup returns -EINVAL -> battery_ok=false
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_adc32.py"   # NCS 3.2: SAADC AIN encoding changed (NRF_SAADC_AIN0 == 0); the old +1 read the wrong pin
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_adcacq.py"   # SAADC acquisition time 3us is too short -> readings ~10% low (measured)
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_uart_console.py"
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_uart_pm.py"
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_conntx.py"   # v48: connection_thread slept after EVERY packet -> capped TX at ~55/s; add missing continue
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_esbclk.py"
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_clkpolicy.py"   # nRF54L HF-clock policy, ONE place (clocks_stop) instead of 3 call-site ifdefs; replaces patch_esbhalt+patch_connclk
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_esback.py"   # v51: nRF54L back to ACK -> REMOVES upstream's "#if NRF54L: noack=true" special case. ACK is ESB collision backoff; noack made the 54 deaf to collisions and it steamrolled the nRF52 trackers.
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_esbreinit.py"   # v43: nRF54L periodic ESB soft-restart (resets PID, un-wedges receiver; only tracker reboot recovers)
          tail -n 10 prj.conf

      - name: Apply receiver options
        if: ${{ steps.cfg.outputs.type == 'receiver' }}
        shell: bash
        run: |
          set -euo pipefail
          cd zephyr-workspace/SlimeVR-Tracker-nRF
          SRC_PROF='${{ steps.cfg.outputs.source }}'
          if [ "$SRC_PROF" = "jiting" ]; then
            # jiting receiver: TDMA が TIMER を実際に使う -> timer.c stub 化は厳禁
            echo "jiting receiver: keep fork timer.c (TDMA active)"
            # 既知トラッカーの再同期を pairing mode なしで自動受理 (再起動後の FIFO 詰まり/妨害対策)
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_jiting_recv_rejoin.py"
          else
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_recvtimerstub.py"   # NCS 3.2: stub timer.c (drops nrfx TIMER1 dep; TDMA unused)
          fi
          tail -n 5 prj.conf

      - name: Enable MCUboot UART DFU
        if: ${{ steps.cfg.outputs.type == 'tracker' && steps.cfg.outputs.fileformat == 'mcuboot' }}
        env:
          CONFIG_JSON: ${{ github.event.inputs.config }}
        shell: bash
        run: |
          set -euo pipefail
          cd zephyr-workspace/SlimeVR-Tracker-nRF
          if [ "${{ steps.cfg.outputs.source }}" = "jiting" ]; then
            # jiting console は指令表構造 + fork 版 esb_ota 無効化を含む
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_mcuboot_dfu_jiting.py"
          else
            python3 "$GITHUB_WORKSPACE/.github/scripts/patch_mcuboot_dfu.py"
          fi
          python3 "$GITHUB_WORKSPACE/.github/scripts/patch_mcuboot_pwr.py"   # mcuboot main.c に EARLY 電源自锁を追記 (短押し起動用)
          python3 "$GITHUB_WORKSPACE/.github/scripts/gen_mcuboot_files.py" \
            "$CONFIG_JSON" "${{ steps.overlay.outputs.overlay_path }}"

      - name: west build
        id: build
        env:
          CONFIG_JSON: ${{ github.event.inputs.config }}
        run: |
          export PATH="$HOME/.venv/bin:$PATH"
          cd zephyr-workspace
          mkdir -p out
          OVL="${{ steps.overlay.outputs.overlay_path }}"
          FMT="${{ steps.cfg.outputs.fileformat }}"; BOARD="${{ steps.cfg.outputs.board_target }}"
          OVLS="$OVL"
          if [ "$FMT" = "hex" ]; then
            if [ "${BOARD#*nrf54l}" = "$BOARD" ]; then
              PART="$GITHUB_WORKSPACE/.github/overlays/nrf52_swd_direct.overlay"
            else
              PART="$GITHUB_WORKSPACE/.github/overlays/nrf54l_swd_direct.overlay"
            fi
            echo "== SWD direct partition overlay: $PART =="; cat "$PART"
            if [ -n "$OVLS" ]; then OVLS="$OVLS;$PART"; else OVLS="$PART"; fi
          fi
          BUILDARGS=(-DNCS_TOOLCHAIN_VERSION=NONE -DBOARD_ROOT=../SlimeVR-Tracker-nRF)
          [ -n "$OVLS" ] && BUILDARGS+=("-DEXTRA_DTC_OVERLAY_FILE=$OVLS")
          SYSB=""
          [ "$FMT" = "hex" ] && SYSB="--no-sysbuild"   # 關 sysbuild/PM,app 直接照 0x0 輸出、無 MBR 保留
          west build $SYSB \
            --board "${{ steps.cfg.outputs.board_target }}" \
            --pristine=always SlimeVR-Tracker-nRF \
            --build-dir SlimeVR-Tracker-nRF/build \
            -- "${BUILDARGS[@]}"

          FMT="${{ steps.cfg.outputs.fileformat }}"
          SHA="${{ steps.clone.outputs.fw_sha }}"; DATE="$(date -u +%Y%m%d)"; RUN="${{ github.run_number }}"
          NAME="${{ steps.cfg.outputs.filename }}_g${SHA}_${DATE}_b${RUN}"
          if [ "$FMT" = "mcuboot" ]; then
          # mcuboot: merged.hex (SWD 初回書き込み) + zephyr.signed.bin (UART 更新用)
          BDIR="SlimeVR-Tracker-nRF/build"
          cp "$BDIR/merged.hex" "out/${NAME}.first_flash.hex"
          UPD="$BDIR/SlimeVR-Tracker-nRF/zephyr/zephyr.signed.bin"
          [ -f "$UPD" ] || UPD="$(find $BDIR -name zephyr.signed.bin | head -1)"
          cp "$UPD" "out/${NAME}.update.bin"
          PYML="$(find $BDIR -name 'partitions*.yml' 2>/dev/null | head -1)"
          [ -z "$PYML" ] && PYML="$(ls SlimeVR-Tracker-nRF/pm_static/pm_static_*.yml 2>/dev/null | head -1)"
          [ -n "$PYML" ] && cp "$PYML" "out/${NAME}.partitions.yml" || true
          else
          SRC="SlimeVR-Tracker-nRF/build/zephyr/zephyr.$FMT"
          [ -f "$SRC" ] || SRC="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.$FMT"
          [ -f "$SRC" ] || SRC="$(find SlimeVR-Tracker-nRF/build -path "*/zephyr/zephyr.$FMT" | grep -v _sysbuild | head -1)"
          [ -f "$SRC" ] || { echo "missing build output (zephyr.$FMT)" >&2; find SlimeVR-Tracker-nRF/build -name "zephyr.$FMT" || true; exit 1; }
          cp "$SRC" "out/${NAME}.${FMT}"
          ZDIR="$(dirname "$SRC")"
          echo "===== OFFSET CHECK (debug) ====="
          grep -iE 'FLASH_LOAD_OFFSET|USE_DT_CODE_PARTITION' "$ZDIR/.config" 2>/dev/null || true
          grep -nE 'code-partition|image-0|partition@0 ' "$ZDIR/zephyr.dts" 2>/dev/null | head || true
          if [ "$FMT" = "hex" ]; then python3 - "$SRC" <<'PYEOF'
          import sys
          f=sys.argv[1]; base=0; lo=1<<32
          for line in open(f):
              line=line.strip()
              if not line.startswith(":"): continue
              ll=int(line[1:3],16); a=int(line[3:7],16); t=int(line[7:9],16); p=line[9:9+ll*2]
              if t==4: base=int(p,16)<<16
              elif t==2: base=int(p,16)<<4
              elif t==0: lo=min(lo, base+a)
          print("lowest load address = 0x%08X %s" % (lo, "(OK 0x0)" if lo==0 else "(!! 0x%X)"%lo))
          PYEOF
          fi
          echo "==============================="
          fi


          EXTRA_HEX=""
          if [ "$FMT" = "uf2" ]; then
            HEXSRC="SlimeVR-Tracker-nRF/build/SlimeVR-Tracker-nRF/zephyr/zephyr.hex"
            if [ -f "$HEXSRC" ]; then cp "$HEXSRC" "out/${NAME}.hex"; EXTRA_HEX="zephyr-workspace/out/${NAME}.hex"; fi
          fi

          PIN="out/${NAME}.pinout.txt"
          {
            echo "SlimeNRF firmware"
            echo "built:    $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo "firmware: ${{ steps.cfg.outputs.repository_url }}@${{ steps.cfg.outputs.repository_revision }} (commit ${SHA})"
            echo "sdk:      ${{ steps.cfg.outputs.sdk_url }}@${{ steps.cfg.outputs.sdk_revision }}"
            echo "board:    ${{ steps.cfg.outputs.board_target }}"
            echo "output:   ${NAME}.${FMT}$( [ -n "$EXTRA_HEX" ] && echo " + ${NAME}.hex" )"
            if [ "$FMT" = "uf2" ]; then FL="bootloader (UF2 拖放 / SWD 保留 bootloader 用 .hex)"; elif [ "$FMT" = "mcuboot" ]; then FL="MCUboot (first_flash.hex SWD 首燒 / update.bin UART 更新)"; else FL="direct SWD (.hex @ 0x0, no bootloader)"; fi
            echo "flashing: $FL"
            echo ""
            echo "== settings =="
            echo "$CONFIG_JSON" | jq -r '"module: \(.module)\ntype:   \(.type)\nIMU:    \(.imu // "-")\nmag:    \(.mag // "-")\nbus:    \(.bus // "-")"'
            echo ""
            echo "== pin assignment =="
            echo "$CONFIG_JSON" | jq -r '.pins // {} | to_entries[] | "  \(.key | ascii_upcase): \(.value)"'
            [ "${{ steps.cfg.outputs.led_type }}" = "strip" ] && echo "  NOTE: LED = WS2812 可定址 data 腳 (單線)"
            if [ -n "$OVL" ] && [ -f "$OVL" ]; then
              echo ""; echo "== generated overlay =="; cat "$OVL"
            fi
          } > "$PIN"

          if [ "$FMT" = "mcuboot" ]; then
            echo "artifact=zephyr-workspace/out/${NAME}.first_flash.hex" >> "$GITHUB_OUTPUT"
            EXTRA_MC="zephyr-workspace/out/${NAME}.update.bin"
            [ -f "zephyr-workspace/out/${NAME}.partitions.yml" ] && EXTRA_MC="$EXTRA_MC zephyr-workspace/out/${NAME}.partitions.yml"
            echo "extra=$EXTRA_MC" >> "$GITHUB_OUTPUT"
          else
            echo "artifact=zephyr-workspace/out/${NAME}.${FMT}" >> "$GITHUB_OUTPUT"
            echo "extra=$EXTRA_HEX" >> "$GITHUB_OUTPUT"
          fi
          echo "pinout=zephyr-workspace/out/${NAME}.pinout.txt" >> "$GITHUB_OUTPUT"

      - name: Upload firmware to release
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="fw-${BUILD_ID}"
          gh release upload "$TAG" "${{ steps.build.outputs.artifact }}" "${{ steps.build.outputs.pinout }}" ${{ steps.build.outputs.extra }} --clobber --repo "$GITHUB_REPOSITORY"
          gh release edit  "$TAG" --notes "STATUS:DONE BUILT:${{ steps.clone.outputs.fw_sha }}" --repo "$GITHUB_REPOSITORY"

      - name: Mark release as failed
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="fw-${BUILD_ID}"
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 && \
            gh release edit "$TAG" --notes "STATUS:FAILED" --repo "$GITHUB_REPOSITORY" || true
